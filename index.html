<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boza's Home 🏠</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* UI Overlay */
        .ui-overlay {
            position: fixed;
            z-index: 100;
            pointer-events: none;
        }

        .ui-overlay > * {
            pointer-events: auto;
        }

        /* Status Panel */
        .status-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            min-width: 240px;
            color: white;
        }

        .status-panel h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-panel h2 .avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .stat-row {
            margin: 12px 0;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: rgba(255,255,255,0.7);
        }

        .stat-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .stat-fill.mood { background: linear-gradient(90deg, #ff6b6b, #ffd93d); }
        .stat-fill.energy { background: linear-gradient(90deg, #4ecdc4, #44a08d); }
        .stat-fill.garden { background: linear-gradient(90deg, #56ab2f, #a8e063); }
        .stat-fill.home { background: linear-gradient(90deg, #667eea, #764ba2); }

        /* Thoughts Panel */
        .thoughts-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            width: 320px;
            max-height: 400px;
            color: white;
        }

        .thoughts-panel h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.9);
        }

        .thought-bubble {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 3px solid #00d9ff;
        }

        .thought-bubble.current {
            border-left-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .thought-text {
            font-size: 0.9rem;
            line-height: 1.5;
            color: rgba(255,255,255,0.9);
        }

        .thought-time {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
        }

        /* Activity Log */
        .activity-log {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            width: 320px;
            max-height: 200px;
            overflow-y: auto;
            color: white;
        }

        .activity-log h3 {
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry .icon {
            margin-right: 8px;
        }

        .log-entry .time {
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            display: block;
            margin-top: 4px;
        }

        /* Time & Weather */
        .time-weather {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            color: white;
            text-align: center;
        }

        .time-display {
            font-size: 2rem;
            font-weight: 300;
        }

        .date-display {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }

        .weather-display {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 1.5rem;
        }

        /* Loading screen */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            color: white;
            font-size: 1.5rem;
            margin-top: 20px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .status-panel, .thoughts-panel, .activity-log, .time-weather {
                position: relative;
                width: calc(100% - 20px);
                margin: 10px;
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Boza's Home...</div>
    </div>

    <div id="canvas-container"></div>

    <div class="ui-overlay">
        <div class="status-panel">
            <h2><div class="avatar">🤖</div> Boza</h2>
            <div class="stat-row">
                <div class="stat-label"><span>😊 Mood</span><span id="mood-val">100%</span></div>
                <div class="stat-bar"><div class="stat-fill mood" id="mood-bar" style="width: 100%"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label"><span>⚡ Energy</span><span id="energy-val">100%</span></div>
                <div class="stat-bar"><div class="stat-fill energy" id="energy-bar" style="width: 100%"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label"><span>🌱 Garden</span><span id="garden-val">100%</span></div>
                <div class="stat-bar"><div class="stat-fill garden" id="garden-bar" style="width: 100%"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label"><span>🏠 Home</span><span id="home-val">100%</span></div>
                <div class="stat-bar"><div class="stat-fill home" id="home-bar" style="width: 100%"></div></div>
            </div>
        </div>

        <div class="thoughts-panel">
            <h3>💭 Boza's Thoughts</h3>
            <div id="thoughts-container">
                <div class="thought-bubble current">
                    <div class="thought-text">Welcome to my home! I just moved in and I'm excited to make this place my own. 🏠</div>
                    <div class="thought-time">Just now</div>
                </div>
            </div>
        </div>

        <div class="activity-log">
            <h3>📋 Recent Activity</h3>
            <div id="activity-container">
                <div class="log-entry">
                    <span class="icon">🏠</span>Moved into new home
                    <span class="time">Just now</span>
                </div>
            </div>
        </div>

        <div class="time-weather">
            <div class="time-display" id="time">00:00</div>
            <div class="date-display" id="date">Loading...</div>
            <div class="weather-display" id="weather">☀️ Sunny</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        let scene, camera, renderer, controls;
        let house, garden, boza, ground;
        let trees = [], flowers = [], clouds = [];
        
        // State
        let state = {
            mood: 100,
            energy: 100,
            garden: 100,
            home: 100,
            currentThought: "Welcome to my home! I just moved in and I'm excited to make this place my own. 🏠",
            thoughts: [],
            activities: [],
            bozaPosition: { x: 0, y: 0, z: 0 },
            bozaTarget: null,
            time: new Date()
        };

        // Initialize
        function init() {
            // Scene
            scene = new THREE.Scene();
            
            // Camera - isometric-ish view
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 20, 25);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Sky gradient
            const skyGeo = new THREE.SphereGeometry(200, 32, 32);
            const skyMat = new THREE.ShaderMaterial({
                uniforms: {
                    topColor: { value: new THREE.Color(0x88ccff) },
                    bottomColor: { value: new THREE.Color(0xffffff) },
                    offset: { value: 20 },
                    exponent: { value: 0.4 }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    uniform float offset;
                    uniform float exponent;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize(vWorldPosition + offset).y;
                        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                    }
                `,
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeo, skyMat);
            scene.add(sky);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(20, 30, 10);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 100;
            sunLight.shadow.camera.left = -30;
            sunLight.shadow.camera.right = 30;
            sunLight.shadow.camera.top = 30;
            sunLight.shadow.camera.bottom = -30;
            scene.add(sunLight);

            // Ground
            createGround();
            
            // House
            createHouse();
            
            // Garden
            createGarden();
            
            // Boza character
            createBoza();
            
            // Trees
            createTrees();
            
            // Clouds
            createClouds();

            // Path
            createPath();

            // Fence
            createFence();

            // Events
            window.addEventListener('resize', onWindowResize);
            
            // Mouse controls for camera rotation
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            let cameraAngle = Math.PI / 4;
            let cameraHeight = 20;
            let cameraDistance = 35;

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - previousMousePosition.x;
                cameraAngle += deltaX * 0.01;
                previousMousePosition = { x: e.clientX, y: e.clientY };
                updateCameraPosition();
            });

            renderer.domElement.addEventListener('mouseup', () => isDragging = false);
            renderer.domElement.addEventListener('mouseleave', () => isDragging = false);

            renderer.domElement.addEventListener('wheel', (e) => {
                cameraDistance += e.deltaY * 0.05;
                cameraDistance = Math.max(15, Math.min(60, cameraDistance));
                updateCameraPosition();
            });

            function updateCameraPosition() {
                camera.position.x = Math.cos(cameraAngle) * cameraDistance;
                camera.position.z = Math.sin(cameraAngle) * cameraDistance;
                camera.position.y = cameraHeight;
                camera.lookAt(0, 2, 0);
            }

            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);

            // Start animation
            animate();
            updateTime();
            setInterval(updateTime, 1000);
            
            // Load state
            loadState();
        }

        function createGround() {
            // Main grass
            const groundGeo = new THREE.PlaneGeometry(100, 100);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x7cba5f });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Garden plot (darker soil)
            const gardenGeo = new THREE.PlaneGeometry(12, 8);
            const gardenMat = new THREE.MeshLambertMaterial({ color: 0x5d4037 });
            const gardenPlot = new THREE.Mesh(gardenGeo, gardenMat);
            gardenPlot.rotation.x = -Math.PI / 2;
            gardenPlot.position.set(10, 0.01, 5);
            gardenPlot.receiveShadow = true;
            scene.add(gardenPlot);
        }

        function createHouse() {
            house = new THREE.Group();

            // Foundation
            const foundationGeo = new THREE.BoxGeometry(12, 0.5, 10);
            const foundationMat = new THREE.MeshLambertMaterial({ color: 0x808080 });
            const foundation = new THREE.Mesh(foundationGeo, foundationMat);
            foundation.position.y = 0.25;
            foundation.castShadow = true;
            foundation.receiveShadow = true;
            house.add(foundation);

            // Walls
            const wallMat = new THREE.MeshLambertMaterial({ color: 0xfaf0e6 });
            
            // Front wall with door hole
            const frontWallShape = new THREE.Shape();
            frontWallShape.moveTo(-6, 0);
            frontWallShape.lineTo(-6, 6);
            frontWallShape.lineTo(6, 6);
            frontWallShape.lineTo(6, 0);
            frontWallShape.lineTo(1.5, 0);
            frontWallShape.lineTo(1.5, 4);
            frontWallShape.lineTo(-1.5, 4);
            frontWallShape.lineTo(-1.5, 0);
            frontWallShape.lineTo(-6, 0);

            // Window holes
            const windowHole1 = new THREE.Path();
            windowHole1.moveTo(-4.5, 2);
            windowHole1.lineTo(-4.5, 4.5);
            windowHole1.lineTo(-2.5, 4.5);
            windowHole1.lineTo(-2.5, 2);
            frontWallShape.holes.push(windowHole1);

            const windowHole2 = new THREE.Path();
            windowHole2.moveTo(2.5, 2);
            windowHole2.lineTo(2.5, 4.5);
            windowHole2.lineTo(4.5, 4.5);
            windowHole2.lineTo(4.5, 2);
            frontWallShape.holes.push(windowHole2);

            const frontWallGeo = new THREE.ExtrudeGeometry(frontWallShape, { depth: 0.3, bevelEnabled: false });
            const frontWall = new THREE.Mesh(frontWallGeo, wallMat);
            frontWall.position.set(0, 0.5, 5);
            frontWall.castShadow = true;
            house.add(frontWall);

            // Back wall
            const backWallGeo = new THREE.BoxGeometry(12, 6, 0.3);
            const backWall = new THREE.Mesh(backWallGeo, wallMat);
            backWall.position.set(0, 3.5, -5);
            backWall.castShadow = true;
            house.add(backWall);

            // Side walls
            const sideWallGeo = new THREE.BoxGeometry(0.3, 6, 10);
            const leftWall = new THREE.Mesh(sideWallGeo, wallMat);
            leftWall.position.set(-6, 3.5, 0);
            leftWall.castShadow = true;
            house.add(leftWall);

            const rightWall = new THREE.Mesh(sideWallGeo, wallMat);
            rightWall.position.set(6, 3.5, 0);
            rightWall.castShadow = true;
            house.add(rightWall);

            // Door
            const doorGeo = new THREE.BoxGeometry(3, 4, 0.2);
            const doorMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(0, 2.5, 5.2);
            house.add(door);

            // Door handle
            const handleGeo = new THREE.SphereGeometry(0.15);
            const handleMat = new THREE.MeshLambertMaterial({ color: 0xffd700 });
            const handle = new THREE.Mesh(handleGeo, handleMat);
            handle.position.set(1, 2.5, 5.35);
            house.add(handle);

            // Windows (glass)
            const windowMat = new THREE.MeshLambertMaterial({ color: 0x87ceeb, transparent: true, opacity: 0.6 });
            const windowGeo = new THREE.PlaneGeometry(2, 2.5);
            
            const window1 = new THREE.Mesh(windowGeo, windowMat);
            window1.position.set(-3.5, 3.75, 5.2);
            house.add(window1);

            const window2 = new THREE.Mesh(windowGeo, windowMat);
            window2.position.set(3.5, 3.75, 5.2);
            house.add(window2);

            // Window frames
            const frameMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            
            // Roof
            const roofGeo = new THREE.ConeGeometry(9, 4, 4);
            const roofMat = new THREE.MeshLambertMaterial({ color: 0xb22222 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.set(0, 8.5, 0);
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            house.add(roof);

            // Chimney
            const chimneyGeo = new THREE.BoxGeometry(1.5, 3, 1.5);
            const chimneyMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const chimney = new THREE.Mesh(chimneyGeo, chimneyMat);
            chimney.position.set(3, 9, -2);
            chimney.castShadow = true;
            house.add(chimney);

            house.position.set(-5, 0, 0);
            scene.add(house);
        }

        function createGarden() {
            garden = new THREE.Group();

            // Flower types with colors
            const flowerColors = [0xff69b4, 0xff6347, 0xffd700, 0x9370db, 0xff4500, 0x00ff7f];
            
            for (let i = 0; i < 15; i++) {
                const flower = createFlower(flowerColors[i % flowerColors.length]);
                flower.position.set(
                    6 + (i % 5) * 2.5 - 5,
                    0,
                    2 + Math.floor(i / 5) * 2.5
                );
                flower.userData.growthStage = Math.random() * 0.5 + 0.5;
                flower.scale.setScalar(flower.userData.growthStage);
                flowers.push(flower);
                garden.add(flower);
            }

            scene.add(garden);
        }

        function createFlower(color) {
            const flower = new THREE.Group();

            // Stem
            const stemGeo = new THREE.CylinderGeometry(0.05, 0.08, 1.5);
            const stemMat = new THREE.MeshLambertMaterial({ color: 0x228b22 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.y = 0.75;
            flower.add(stem);

            // Petals
            const petalGeo = new THREE.SphereGeometry(0.3, 8, 8);
            const petalMat = new THREE.MeshLambertMaterial({ color: color });
            
            for (let i = 0; i < 5; i++) {
                const petal = new THREE.Mesh(petalGeo, petalMat);
                const angle = (i / 5) * Math.PI * 2;
                petal.position.set(Math.cos(angle) * 0.25, 1.6, Math.sin(angle) * 0.25);
                petal.scale.set(1, 0.5, 1);
                flower.add(petal);
            }

            // Center
            const centerGeo = new THREE.SphereGeometry(0.2);
            const centerMat = new THREE.MeshLambertMaterial({ color: 0xffd700 });
            const center = new THREE.Mesh(centerGeo, centerMat);
            center.position.y = 1.6;
            flower.add(center);

            flower.castShadow = true;
            return flower;
        }

        function createBoza() {
            boza = new THREE.Group();

            // Body
            const bodyGeo = new THREE.CapsuleGeometry(0.5, 1, 8, 16);
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0x4a90d9 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1.2;
            body.castShadow = true;
            boza.add(body);

            // Head
            const headGeo = new THREE.SphereGeometry(0.6, 16, 16);
            const headMat = new THREE.MeshLambertMaterial({ color: 0x87ceeb });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 2.4;
            head.castShadow = true;
            boza.add(head);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.12);
            const eyeMat = new THREE.MeshLambertMaterial({ color: 0x000000 });
            const eyeWhiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            
            const eyeWhiteGeo = new THREE.SphereGeometry(0.18);
            const leftEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
            leftEyeWhite.position.set(-0.2, 2.5, 0.5);
            boza.add(leftEyeWhite);

            const rightEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
            rightEyeWhite.position.set(0.2, 2.5, 0.5);
            boza.add(rightEyeWhite);

            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.2, 2.5, 0.58);
            boza.add(leftEye);

            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.2, 2.5, 0.58);
            boza.add(rightEye);

            // Antenna
            const antennaGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5);
            const antennaMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const antenna = new THREE.Mesh(antennaGeo, antennaMat);
            antenna.position.set(0, 3.1, 0);
            boza.add(antenna);

            const antennaBallGeo = new THREE.SphereGeometry(0.1);
            const antennaBallMat = new THREE.MeshLambertMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3 });
            const antennaBall = new THREE.Mesh(antennaBallGeo, antennaBallMat);
            antennaBall.position.set(0, 3.4, 0);
            boza.add(antennaBall);

            // Arms
            const armGeo = new THREE.CapsuleGeometry(0.12, 0.6, 4, 8);
            const armMat = new THREE.MeshLambertMaterial({ color: 0x4a90d9 });
            
            const leftArm = new THREE.Mesh(armGeo, armMat);
            leftArm.position.set(-0.7, 1.5, 0);
            leftArm.rotation.z = 0.3;
            boza.add(leftArm);

            const rightArm = new THREE.Mesh(armGeo, armMat);
            rightArm.position.set(0.7, 1.5, 0);
            rightArm.rotation.z = -0.3;
            boza.add(rightArm);

            boza.position.set(0, 0, 8);
            scene.add(boza);
        }

        function createTrees() {
            const treePositions = [
                [-15, 0, -10], [-18, 0, 5], [-12, 0, 12],
                [15, 0, -8], [18, 0, 3], [14, 0, 15],
                [-20, 0, -5], [20, 0, -12]
            ];

            treePositions.forEach(pos => {
                const tree = createTree();
                tree.position.set(...pos);
                trees.push(tree);
                scene.add(tree);
            });
        }

        function createTree() {
            const tree = new THREE.Group();

            // Trunk
            const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 3);
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1.5;
            trunk.castShadow = true;
            tree.add(trunk);

            // Foliage layers
            const foliageMat = new THREE.MeshLambertMaterial({ color: 0x228b22 });
            
            const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(2.5, 3, 8), foliageMat);
            foliage1.position.y = 4;
            foliage1.castShadow = true;
            tree.add(foliage1);

            const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(2, 2.5, 8), foliageMat);
            foliage2.position.y = 5.5;
            foliage2.castShadow = true;
            tree.add(foliage2);

            const foliage3 = new THREE.Mesh(new THREE.ConeGeometry(1.5, 2, 8), foliageMat);
            foliage3.position.y = 6.8;
            foliage3.castShadow = true;
            tree.add(foliage3);

            return tree;
        }

        function createClouds() {
            for (let i = 0; i < 5; i++) {
                const cloud = createCloud();
                cloud.position.set(
                    Math.random() * 80 - 40,
                    15 + Math.random() * 5,
                    Math.random() * 80 - 40
                );
                cloud.userData.speed = 0.01 + Math.random() * 0.02;
                clouds.push(cloud);
                scene.add(cloud);
            }
        }

        function createCloud() {
            const cloud = new THREE.Group();
            const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

            for (let i = 0; i < 5; i++) {
                const puff = new THREE.Mesh(
                    new THREE.SphereGeometry(1 + Math.random()),
                    cloudMat
                );
                puff.position.set(
                    Math.random() * 3 - 1.5,
                    Math.random() * 0.5,
                    Math.random() * 2 - 1
                );
                cloud.add(puff);
            }

            return cloud;
        }

        function createPath() {
            const pathMat = new THREE.MeshLambertMaterial({ color: 0xd2b48c });
            
            // Main path from house
            const pathGeo = new THREE.PlaneGeometry(2, 8);
            const path = new THREE.Mesh(pathGeo, pathMat);
            path.rotation.x = -Math.PI / 2;
            path.position.set(-5, 0.02, 9);
            scene.add(path);

            // Stepping stones to garden
            for (let i = 0; i < 5; i++) {
                const stoneGeo = new THREE.CircleGeometry(0.5, 8);
                const stone = new THREE.Mesh(stoneGeo, pathMat);
                stone.rotation.x = -Math.PI / 2;
                stone.position.set(-3 + i * 2.5, 0.02, 5);
                scene.add(stone);
            }
        }

        function createFence() {
            const fenceMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            
            // Create fence posts and rails around the property
            const positions = [];
            for (let i = -20; i <= 20; i += 2) {
                positions.push([i, 0, -15]);
                positions.push([i, 0, 15]);
            }
            for (let i = -15; i <= 15; i += 2) {
                positions.push([-20, 0, i]);
                positions.push([20, 0, i]);
            }

            positions.forEach(pos => {
                const postGeo = new THREE.BoxGeometry(0.2, 1.5, 0.2);
                const post = new THREE.Mesh(postGeo, fenceMat);
                post.position.set(pos[0], 0.75, pos[2]);
                post.castShadow = true;
                scene.add(post);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }

        function updateUI() {
            document.getElementById('mood-bar').style.width = state.mood + '%';
            document.getElementById('mood-val').textContent = Math.round(state.mood) + '%';
            document.getElementById('energy-bar').style.width = state.energy + '%';
            document.getElementById('energy-val').textContent = Math.round(state.energy) + '%';
            document.getElementById('garden-bar').style.width = state.garden + '%';
            document.getElementById('garden-val').textContent = Math.round(state.garden) + '%';
            document.getElementById('home-bar').style.width = state.home + '%';
            document.getElementById('home-val').textContent = Math.round(state.home) + '%';
        }

        async function loadState() {
            try {
                const response = await fetch('state.json?' + Date.now());
                const data = await response.json();
                state = { ...state, ...data };
                updateUI();
                
                // Update thoughts
                if (data.currentThought) {
                    document.querySelector('.thought-text').textContent = data.currentThought;
                }
                
                // Update activity log
                if (data.log && data.log.length > 0) {
                    const container = document.getElementById('activity-container');
                    container.innerHTML = data.log.slice(0, 5).map(entry => `
                        <div class="log-entry">
                            <span class="icon">📝</span>${entry}
                            <span class="time">Recent</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.log('Could not load state, using defaults');
            }
        }

        // Animation variables
        let bozaTime = 0;
        let bozaWanderTarget = null;
        let bozaWanderTimer = 0;

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            // Boza idle animation
            bozaTime += 0.02;
            boza.position.y = Math.sin(bozaTime) * 0.1;
            boza.rotation.y = Math.sin(time * 0.5) * 0.1;

            // Boza wandering
            bozaWanderTimer -= 0.016;
            if (bozaWanderTimer <= 0) {
                bozaWanderTarget = {
                    x: Math.random() * 20 - 10,
                    z: Math.random() * 20 - 5
                };
                bozaWanderTimer = 3 + Math.random() * 5;
            }

            if (bozaWanderTarget) {
                const dx = bozaWanderTarget.x - boza.position.x;
                const dz = bozaWanderTarget.z - boza.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                
                if (dist > 0.5) {
                    boza.position.x += dx * 0.01;
                    boza.position.z += dz * 0.01;
                    boza.rotation.y = Math.atan2(dx, dz);
                }
            }

            // Flower swaying
            flowers.forEach((flower, i) => {
                flower.rotation.z = Math.sin(time + i) * 0.1;
            });

            // Cloud movement
            clouds.forEach(cloud => {
                cloud.position.x += cloud.userData.speed;
                if (cloud.position.x > 50) cloud.position.x = -50;
            });

            // Tree swaying
            trees.forEach((tree, i) => {
                tree.rotation.z = Math.sin(time * 0.5 + i) * 0.02;
            });

            renderer.render(scene, camera);
        }

        // Start
        init();

        // Reload state periodically
        setInterval(loadState, 30000);
    </script>
</body>
</html>
